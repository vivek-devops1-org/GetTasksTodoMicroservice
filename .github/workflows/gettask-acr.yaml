name: Build and Push to ACR
on: workflow_dispatch
env:
  IMAGE_NAME: gettask
  VERSION: v${{ github.run_number }}
  CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  
jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}          
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.VERSION }} .

      - name: Tag Docker image
        run: docker tag ${{ env.IMAGE_NAME }}:${{ env.VERSION }} ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} 

      - name: Push Docker image
        run: docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
       
      # ---------------------------------
      # Update deployment.yaml
      # ---------------------------------
      - name: Update Kubernetes Manifest
        shell: powershell
        run: |
          $file = "manifests/deployment.yaml"
      
          $newImage = "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
      
          (Get-Content $file) `
            -replace 'image:.*', "image: $newImage" |
            Set-Content $file
      
          Write-Host "Updated deployment.yaml"
      
          Get-Content $file

      # ---------------------------------
      # Commit changes back
      # ---------------------------------
      - name: Commit and Push Changes
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"

          git add manifests/deployment.yaml

          git commit -m "Update image to ${{ env.VERSION }}"

          git push
          
   

          
